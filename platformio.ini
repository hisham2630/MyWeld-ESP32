; MyWeld ESP32-S3 Spot Welder Controller
; Board: JC3248W535 (Guition ESP32-S3, 480x320 TFT, AXS15231B)
; Framework: ESP-IDF 5.x
; Display: esp_lcd + LVGL 9.x

[env:jc3248w535]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts =
    pre:name_firmware.py
    pre:fix_lvgl_asm.py

; --- Board Configuration ---
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; --- Partition Table ---
board_build.partitions = partitions.csv

; --- Serial Monitor ---
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; --- Upload ---
upload_speed = 921600

; --- Libraries ---
lib_deps =
    lvgl/lvgl@^9.2.0

; --- Build Flags ---
; CRITICAL: use -DLV_CONF_INCLUDE_SIMPLE instead of -DLV_CONF_SKIP.
;   LV_CONF_SKIP tells LVGL to ignore lv_conf.h completely, so LV_TICK_CUSTOM,
;   LV_COLOR_DEPTH, LV_USE_OS and every other setting is lost → blank screen.
;   LV_CONF_INCLUDE_SIMPLE tells LVGL to find lv_conf.h via the -I src path.
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    ; --- Variant selection (JC3248W535 = QSPI TFT + I2S Audio) ---
    -DDISPLAY_TYPE=1
    -DAUDIO_TYPE=1
    -DBOARD_VARIANT=1
    ; Fonts used by the UI (must match lv_conf.h)
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_36=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_THEME_DEFAULT=1
    ; Use standard C allocator (malloc/free) so LVGL buffers can go to PSRAM
    -DLV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
    ; Disable ARM Helium SIMD (Cortex-M55 only — not available on Xtensa ESP32)
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -DCORE_DEBUG_LEVEL=5
    -I src

; ============================================================================
; Common build flags shared by all environments
; ============================================================================
[common]
build_flags_shared =
    -DBOARD_HAS_PSRAM
    -I src
    -DCORE_DEBUG_LEVEL=5

; ============================================================================
; Variant: JC4827W543 (Guition 4.3" 480×272 NV3041A + GT911 touch)
; Build: pio run -e jc4827w543
; Upload: pio run -e jc4827w543 --target upload
; ============================================================================
[env:jc4827w543]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts =
    pre:name_firmware.py
    pre:fix_lvgl_asm.py

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB

; --- Partition Table (4MB flash — trimmed OTA) ---
board_build.partitions = partitions_4mb.csv

; --- ESP-IDF sdkconfig: base defaults + 4MB flash override ---
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.jc4827w543

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

lib_deps =
    lvgl/lvgl@^9.2.0

build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    ; --- Variant selection (JC4827W543 = QSPI TFT + I2S Audio) ---
    -DDISPLAY_TYPE=1
    -DAUDIO_TYPE=1
    -DBOARD_VARIANT=4
    ; Fonts used by the UI (must match lv_conf.h)
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_36=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_THEME_DEFAULT=1
    -DLV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -DCORE_DEBUG_LEVEL=5
    -I src


; ============================================================================
; Variant: ESP32-S3 + Nextion HMI Display + MAX98357 I2S Audio
; Build: pio run -e esp32s3_nextion
; Upload: pio run -e esp32s3_nextion --target upload
; ============================================================================
[env:esp32s3_nextion]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts = pre:name_firmware.py

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

; No LVGL needed — Nextion handles its own UI rendering
lib_deps =

build_flags =
    ${common.build_flags_shared}
    ; --- Variant selection ---
    -DDISPLAY_TYPE=2
    -DAUDIO_TYPE=1
    -DBOARD_VARIANT=2

; ============================================================================
; Variant: ESP32-S3 + 20×4 Character LCD + MAX98357 I2S Audio
; Build: pio run -e esp32s3_lcd2004
; Upload: pio run -e esp32s3_lcd2004 --target upload
; ============================================================================
[env:esp32s3_lcd2004]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts = pre:name_firmware.py

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

; No LVGL needed — simple character LCD
